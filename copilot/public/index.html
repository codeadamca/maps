<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapbox Export App</title>
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #f3ecdf;
      --paper-shade: #ebe1d0;
      --ink: #30475c;
      --line: #6f8696;
      --line-soft: #9aa6ae;
      --contour: #b8a898;
      --panel-shadow: rgba(48, 71, 92, 0.18);
      --frame-inset: 0px;
    }
    html, body { height: 100%; margin: 0; }
    body {
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      background: var(--paper);
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
    }
    #container {
      display: flex;
      height: 100vh;
      width: 100vw;
    }
    #side-panel {
      width: 20vw;
      max-width: 300px;
      min-width: 180px;
      background: linear-gradient(180deg, rgba(243, 236, 223, 0.98), rgba(235, 225, 208, 0.96));
      border-right: 1px solid rgba(111, 134, 150, 0.3);
      padding: 24px 16px;
      box-sizing: border-box;
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow: hidden;
      box-shadow: 8px 0 24px var(--panel-shadow);
    }
    #map {
      flex: 1 1 0;
      position: relative;
      min-width: 0;
      height: 100vh;
    }
    #map-stage {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      display: grid;
      place-items: center;
    }
    #map-window {
      position: absolute;
      overflow: hidden;
    }
    #map-canvas {
      position: absolute;
      inset: 0;
    }
    #map-canvas .mapboxgl-ctrl-logo,
    #map-canvas .mapboxgl-ctrl-bottom-left,
    #map-canvas .mapboxgl-ctrl-bottom-right,
    #map-canvas .mapboxgl-ctrl-attrib {
      display: none !important;
    }
    #glazing-copy {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 18px;
      box-sizing: border-box;
      pointer-events: none;
      text-align: center;
      z-index: 16;
    }
    #glazing-copy-inner {
      display: grid;
      gap: 8px;
      justify-items: center;
      color: var(--ink);
      text-transform: uppercase;
      width: 100%;
    }
    #map-title {
      margin: 0;
      font-family: "Playfair Display", Georgia, serif;
      font-size: clamp(22px, 3.7vh, 44px);
      font-weight: 700;
      letter-spacing: 0.03em;
      line-height: 0.94;
      text-wrap: balance;
      max-width: 100%;
    }
    #map-subtitle {
      margin: 0;
      font-family: "Playfair Display", Georgia, serif;
      font-size: clamp(11px, 1.8vh, 21px);
      font-weight: 600;
      letter-spacing: 0.08em;
      line-height: 1;
      text-wrap: balance;
      max-width: 100%;
    }
    #frame-overlay {
      position: absolute;
      inset: var(--frame-inset);
      pointer-events: none;
      display: grid;
      place-items: center;
      z-index: 15;
    }
    #frame-image {
      width: 100%;
      height: 100%;
      background-image: url('frame.png');
      background-position: center;
      background-repeat: no-repeat;
      background-size: contain;
    }
    h2 {
      margin: 0;
      font-size: 1.55rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    #controls {
      background: none;
      border: none;
      padding: 0;
      position: static;
      box-shadow: none;
      display: grid;
      gap: 8px;
    }
    button {
      margin: 0;
      border: 1px solid rgba(111, 134, 150, 0.45);
      background: rgba(247, 241, 231, 0.92);
      color: var(--ink);
      padding: 10px 12px;
      text-align: left;
      font: inherit;
      cursor: pointer;
      transition: background 160ms ease, border-color 160ms ease, transform 160ms ease;
    }
    button:hover {
      background: rgba(255, 250, 241, 0.98);
      border-color: var(--line);
      transform: translateX(1px);
    }
    .panel-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 0;
    }
    .section-title {
      margin: 0;
      font-size: 1rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    #trail-status {
      margin: 0;
      color: var(--line);
      font-size: 0.9rem;
    }
    #trail-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
      padding-right: 4px;
    }
    .trail-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 0.95rem;
      line-height: 1.3;
      padding: 8px 10px;
      background: rgba(247, 241, 231, 0.55);
      border: 1px solid rgba(111, 134, 150, 0.14);
    }
    .trail-item input {
      margin-top: 2px;
      accent-color: var(--ink);
    }
    .trail-meta {
      color: var(--line);
      font-size: 0.82rem;
    }
    .curve-handle {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: var(--line);
      border: 2px solid var(--paper);
      box-shadow: 0 0 0 1px rgba(48, 71, 92, 0.2);
      cursor: grab;
    }
    .mapboxgl-popup-content {
      background: rgba(247, 241, 231, 0.95);
      color: var(--ink);
      border: 1px solid rgba(111, 134, 150, 0.28);
      border-radius: 0;
      box-shadow: 0 8px 20px rgba(48, 71, 92, 0.12);
      font-family: Georgia, "Times New Roman", serif;
    }
    .mapboxgl-popup-tip {
      border-top-color: rgba(247, 241, 231, 0.95) !important;
      border-bottom-color: rgba(247, 241, 231, 0.95) !important;
    }
    .mapboxgl-ctrl-group {
      border-radius: 0;
      overflow: hidden;
      box-shadow: 0 6px 16px rgba(48, 71, 92, 0.12);
    }
    .mapboxgl-ctrl-group button {
      background: rgba(247, 241, 231, 0.95);
    }
  </style>
</head>
<body>
  <div id="container">
    <div id="side-panel">
      <h2>Mapbox Export App</h2>
      <div id="controls">
        <button id="add-points">Add Points</button>
        <button id="export-svg">Export SVG</button>
        <button id="curves">Curves</button>
      </div>
      <section class="panel-section">
        <h3 class="section-title">Hiking Trails Nearby</h3>
        <p id="trail-status">Loading trails for the current map area...</p>
        <div id="trail-list"></div>
      </section>
    </div>
    <div id="map">
      <div id="map-stage">
        <div id="map-window">
          <div id="map-canvas"></div>
        </div>
        <div id="glazing-copy" aria-hidden="true">
          <div id="glazing-copy-inner">
            <h1 id="map-title">Whitestone Lake</h1>
            <p id="map-subtitle">Dunchurch, Ontario, Canada</p>
          </div>
        </div>
        <div id="frame-overlay" aria-hidden="true">
          <div id="frame-image"></div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6.5.0/turf.min.js"></script>
  <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
