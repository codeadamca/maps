<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studio | Lakelines Co.</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0e0e11;
      --panel: rgba(20,20,24,0.92);
      --panel-border: #2a2a30;
      --text: #e8e6e3;
      --muted: #9b9790;
      --accent: #5b8def;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 28px;
      display: grid;
      place-items: center;
      font-family: Inter, system-ui, -apple-system, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(91,141,239,0.20), transparent 28%),
        radial-gradient(circle at bottom right, rgba(107,159,216,0.16), transparent 28%),
        var(--bg);
      color: var(--text);
    }

    .home {
      width: min(1040px, 100%);
      display: grid;
      gap: 24px;
    }

    .hero {
      padding: 12px 4px;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(2.5rem, 6vw, 5.5rem);
      line-height: 0.95;
      letter-spacing: -0.04em;
    }

    .hero p {
      margin: 14px 0 0;
      max-width: 52ch;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.6;
    }

    .options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .card {
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 28px;
      border-radius: 24px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      color: inherit;
      text-decoration: none;
      box-shadow: 0 26px 60px rgba(0,0,0,0.28);
      transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: rgba(91,141,239,0.55);
      box-shadow: 0 32px 72px rgba(0,0,0,0.34);
    }

    .card-head {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .card-icon {
      width: 48px;
      height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      background: rgba(91,141,239,0.12);
      color: var(--accent);
      flex-shrink: 0;
    }

    .card-icon svg {
      width: 24px;
      height: 24px;
      display: block;
    }

    .card-label {
      display: inline-block;
      margin-bottom: 18px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(91,141,239,0.12);
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .card h2 {
      margin: 0;
      font-size: clamp(1.5rem, 3vw, 2.5rem);
      line-height: 1;
    }

    .card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      max-width: 34ch;
    }

    .card-cta {
      margin-top: auto;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(91,141,239,0.14);
      color: #fff;
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      width: fit-content;
      transition: background 180ms ease, transform 180ms ease;
    }

    .card:hover .card-cta {
      background: rgba(91,141,239,0.22);
      transform: translateX(2px);
    }

    .card-cta-arrow {
      font-size: 1rem;
      line-height: 1;
    }

    @media (max-width: 760px) {
      body { padding: 20px; }
      .options { grid-template-columns: 1fr; }
      .card { padding: 22px; }
    }
  </style>
</head>
<body>
  <main class="home">
    <section class="hero">
      <h1>Lake Lines Studio</h1>
    </section>

    <section class="options" aria-label="Main options">
      <a class="card" href="/map">
        <div class="card-head">
          <span class="card-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M3 6.5 8.5 4l7 2.5L21 4v13.5L15.5 20l-7-2.5L3 20V6.5Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
              <path d="M8.5 4v13.5M15.5 6.5V20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </span>
          <h2>Custom Map</h2>
        </div>
        <p>Design a custom map with themes, layers, and POIs, then request a print and frame.</p>
        <span class="card-cta">Get Started <span class="card-cta-arrow" aria-hidden="true">→</span></span>
      </a>

      <a class="card" href="/lake">
        <div class="card-head">
          <span class="card-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M7 6.5h8a3 3 0 0 1 3 3V14a4.5 4.5 0 0 1-4.5 4.5H10A5 5 0 0 1 5 13.5V8.5a2 2 0 0 1 2-2Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
              <path d="M15 9h3.5a1.5 1.5 0 0 1 0 3H18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <path d="M8 4.5h5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </span>
          <h2>Lake Search</h2>
        </div>
        <p>Find a lake to print, put on mugs, candles, and more.</p>
        <span class="card-cta">Get Started <span class="card-cta-arrow" aria-hidden="true">→</span></span>
      </a>
    </section>
  </main>
</body>
</html>
