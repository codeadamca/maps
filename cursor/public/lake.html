<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lake Silhouette | Lakelines Co.</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&family=Roboto+Condensed:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="/styles.css" rel="stylesheet">
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <header class="sidebar-header">
        <div class="sidebar-breadcrumb">
          <a href="/" class="sidebar-home-link">Home</a>
          <span>/</span>
          <span>Lake Silhouette</span>
        </div>
        <h1>Lake Silhouette</h1>
      </header>

      <section class="location-panel">
        <h2 class="location-heading">Lake Search</h2>
        <div class="search-wrap">
          <input type="search" id="lake-search" placeholder="Search lakes…" autocomplete="off">
          <ul id="lake-search-results" class="search-results" hidden></ul>
        </div>
      </section>

      <nav class="accordion" id="sidebar-accordion" aria-label="Lake silhouette settings">
        <section class="accordion-item" data-accordion-id="theme">
          <button type="button" class="accordion-trigger" aria-expanded="false" aria-controls="panel-theme" id="trigger-theme">
            <span class="accordion-label">Theme</span>
            <span class="accordion-chevron" aria-hidden="true"></span>
          </button>
          <div class="accordion-panel" id="panel-theme" role="region" aria-labelledby="trigger-theme" hidden>
            <div id="theme-grid" class="theme-grid"></div>
          </div>
        </section>

        <section class="accordion-item" data-accordion-id="format">
          <button type="button" class="accordion-trigger" aria-expanded="false" aria-controls="panel-format" id="trigger-format">
            <span class="accordion-label">Format</span>
            <span class="accordion-chevron" aria-hidden="true"></span>
          </button>
          <div class="accordion-panel" id="panel-format" role="region" aria-labelledby="trigger-format" hidden>
            <label class="field">
              <span>Font</span>
              <select id="label-font">
                <option value="Playfair Display">Playfair Display</option>
                <option value="Inter">Inter</option>
                <option value="Roboto Condensed">Roboto Condensed</option>
                <option value="Cormorant Garamond">Cormorant Garamond</option>
              </select>
            </label>
          </div>
        </section>

        <section class="accordion-item" data-accordion-id="labels">
          <button type="button" class="accordion-trigger" aria-expanded="false" aria-controls="panel-labels" id="trigger-labels">
            <span class="accordion-label">Labels</span>
            <span class="accordion-chevron" aria-hidden="true"></span>
          </button>
          <div class="accordion-panel" id="panel-labels" role="region" aria-labelledby="trigger-labels" hidden>
            <label class="field">
              <span>Lake Name</span>
              <input type="text" id="label-lake-name" maxlength="80">
            </label>
            <label class="field">
              <span>Region</span>
              <input type="text" id="label-region" maxlength="80">
            </label>
            <label class="field">
              <span>Coordinates</span>
              <input type="text" id="label-coordinates" maxlength="80" readonly>
            </label>
          </div>
        </section>
      </nav>

      <div class="export-actions">
        <button type="button" id="export-png" class="btn-primary">Download PNG</button>
        <button type="button" id="export-svg" class="btn-secondary">Download SVG</button>
      </div>
    </aside>

    <main class="preview">
      <div class="preview-container" id="preview-container">
        <div class="document-viewport" id="document-viewport">
          <div class="document lake-document" id="lake-frame">
            <div class="lake-silhouette-area">
              <svg class="lake-silhouette-svg" id="lake-silhouette-svg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">
                <!-- Lake GeoJSON rendered here -->
              </svg>
            </div>
            <div class="lake-labels-area" id="lake-labels">
              <h2 id="lake-label-name"></h2>
              <p id="lake-label-region"></p>
              <p id="lake-label-coordinates"></p>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/lakeApp.js"></script>
</body>
</html>
