<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lake Search | Lakelines Co.</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&family=Roboto+Condensed:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="/styles.css" rel="stylesheet">
</head>
<body>

  <div class="app">
    <aside class="sidebar" id="sidebar">
      <header class="sidebar-header">
        <div class="sidebar-breadcrumb">
          <a href="/" class="sidebar-home-link">Home</a>
          <span>/</span>
          <span>Lake Silhouette</span>
        </div>
        <h1>Lake</h1>
      </header>

      <section class="location-panel">
        <h2 class="location-heading">Lake Search</h2>
        <div class="search-wrap">
          <input type="search" id="lake-search" placeholder="Search lakes…" autocomplete="off">
          <ul id="lake-search-results" class="search-results" hidden></ul>
        </div>
      </section>

      <nav class="accordion" id="sidebar-accordion" aria-label="Lake silhouette settings">
        <section class="accordion-item" data-accordion-id="labels">
          <button type="button" class="accordion-trigger" aria-expanded="false" aria-controls="panel-labels" id="trigger-labels">
            <span class="accordion-label">Labels</span>
            <span class="accordion-chevron" aria-hidden="true"></span>
          </button>
          <div class="accordion-panel" id="panel-labels" role="region" aria-labelledby="trigger-labels" hidden>
            <label class="field">
              <span>Lake Name</span>
              <input type="text" id="label-lake-name" maxlength="80">
            </label>
            <label class="field">
              <span>Region</span>
              <input type="text" id="label-region" maxlength="80">
            </label>
            <label class="field">
              <span>Coordinates</span>
              <input type="text" id="label-coordinates" maxlength="80" readonly>
            </label>
          </div>
        </section>
      </nav>

      <div class="export-actions">
        <!-- Hidden original buttons kept for JS compatibility -->
        <button type="button" id="export-png" class="btn-primary" style="display:none">Download PNG</button>
        <button type="button" id="export-svg" class="btn-secondary" style="display:none">Download SVG</button>

        <!-- New direct download/template links -->
        <div class="export-links">
          <a id="btn-shop" class="btn-secondary" href="#" target="_blank" rel="noopener">Shop this Lake</a>
        </div>
      </div>
    </aside>

    <main class="preview">
      <div class="preview-container" id="preview-container">
        <div class="preview-toolbar">
          <button type="button" id="rotate-left" class="icon-btn" title="Rotate left 15 degrees" aria-label="Rotate left 15 degrees">↻</button>
          <button type="button" id="rotate-right" class="icon-btn" title="Rotate right 15 degrees" aria-label="Rotate right 15 degrees">↺</button>
          <button type="button" id="reset-app-button" class="icon-btn" title="Reset application" aria-label="Reset application">⟲</button>
          <button type="button" id="delete-button" class="icon-btn" title="Delete design" aria-label="Delete design">×</button>
        </div>
        <div class="document-viewport" id="document-viewport">
          <div class="document lake-document" id="lake-frame">
            <div class="lake-silhouette-area" id="lake-silhouette-area">
              <svg class="lake-silhouette-svg" id="lake-silhouette-svg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">
                <!-- Lake GeoJSON rendered here -->
              </svg>
            </div>
            <div class="lake-labels-area" id="lake-labels">
              <h2 id="lake-label-name"></h2>
              <p id="lake-label-region"></p>
              <p id="lake-label-coordinates"></p>
            </div>
          </div>
        </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/javascript/appInit.js"></script>
  <script src="/javascript/ownerInit.js"></script>
  <script src="/javascript/designInit.js"></script>  
  <script src="/lakeApp.js"></script>
  
</body>
</html>
