<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon | Lakelines Co.</title>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Baskervville:wght@400;700&family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&family=Roboto+Condensed:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="/styles.css" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>

  <main class="home coming-soon">

    <section class="hero">
      <h1>Coming Soon</h1>
      
    </section>

    <div style="width:100%; margin-top:18px;">
      <div class="card" style="grid-column: 1 / -1; margin-bottom: 24px; width:100%; display:block;">
        <div class="card-columns">
          <div class="card-col card-col--left">
            <div class="card-head">
              <span class="card-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M3 6.5 8.5 4l7 2.5L21 4v13.5L15.5 20l-7-2.5L3 20V6.5Z" stroke="#fff" stroke-width="1.8" stroke-linejoin="round"/>
                  <path d="M8.5 4v13.5M15.5 6.5V20" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
              </span>
              <h2>Custom Maps</h2>
            </div>
            <p>
                Design a custom map of your lake including lakes, roads, points of interest, and
                more. 
            </p>
            <p>
              Launching in the Summer of 2026. Join our email list to be notified of launch!
            </p>
            
            <div class="hero-actions">
              <a href="/" class="btn-primary">
                Home  
                <span class="card-cta-arrow" aria-hidden="true">→</span>
              </a>
              <a href="https://shop.lakelines.co/pages/newsletter" class="btn-secondary" target="_blank" rel="noopener">
                Sign Up  
                <span class="card-cta-arrow" aria-hidden="true">→</span>
              </a>
            </div>

          </div>
          <div class="card-col card-col--right">
            <img src="https://lakelines.co/images/wall/bernard.jpg" alt="Bernard wall" class="coming-image">
          </div>
        </div>
      </div>
    </div>

  </main>

</html>
