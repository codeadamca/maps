<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Map | Lakelines Co.</title>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&family=Roboto+Condensed:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="/styles.css" rel="stylesheet">
</head>
<body>

  <div class="app">
    <aside class="sidebar" id="sidebar">
      <header class="sidebar-header">
        <div class="sidebar-breadcrumb">
          <a href="/" class="sidebar-home-link">Home</a>
          <span>/</span>
          <span>Custom Map</span>
        </div>
        <h1>Custom Map</h1>
      </header>

      <div class="debug-panel" id="debug-panel">
        <label for="debug-coords">Debug</label>
        <input type="text" id="debug-coords" readonly aria-label="Debug current center coordinates">
        <input type="text" id="debug-zoom" readonly aria-label="Debug current zoom level">
      </div>

      <section class="location-panel">
        <h2 class="location-heading">Location</h2>
        <div class="search-wrap">
          <input type="search" id="location-search" placeholder="Search city or region…" autocomplete="off">
          <ul id="search-results" class="search-results" hidden></ul>
        </div>
      </section>

      <nav class="accordion" id="sidebar-accordion" aria-label="Poster settings">
        <section class="accordion-item" data-accordion-id="theme">
          <button type="button" class="accordion-trigger" aria-expanded="false" aria-controls="panel-theme" id="trigger-theme">
            <span class="accordion-label">Theme</span>
            <span class="accordion-chevron" aria-hidden="true"></span>
          </button>
          <div class="accordion-panel" id="panel-theme" role="region" aria-labelledby="trigger-theme" hidden>
            <div id="theme-grid" class="theme-grid"></div>
          </div>
        </section>

        <section class="accordion-item" data-accordion-id="layers">
          <button type="button" class="accordion-trigger" aria-expanded="false" aria-controls="panel-layers" id="trigger-layers">
            <span class="accordion-label">Layers</span>
            <span class="accordion-chevron" aria-hidden="true"></span>
          </button>
          <div class="accordion-panel" id="panel-layers" role="region" aria-labelledby="trigger-layers" hidden>
            <div class="layer-list" id="layer-list"></div>
          </div>
        </section>

        <section class="accordion-item" data-accordion-id="labels">
          <button type="button" class="accordion-trigger" aria-expanded="false" aria-controls="panel-labels" id="trigger-labels">
            <span class="accordion-label">Labels</span>
            <span class="accordion-chevron" aria-hidden="true"></span>
          </button>
          <div class="accordion-panel" id="panel-labels" role="region" aria-labelledby="trigger-labels" hidden>
            <label class="field">
              <span>Title</span>
              <input type="text" id="label-city" maxlength="80">
            </label>
            <label class="field">
              <span>Subtitle</span>
              <input type="text" id="label-country" maxlength="80">
            </label>
            <label class="field">
              <span>Font</span>
              <select id="label-font">
                <option value="Playfair Display">Playfair Display</option>
                <option value="Inter">Inter</option>
                <option value="Roboto Condensed">Roboto Condensed</option>
                <option value="Cormorant Garamond">Cormorant Garamond</option>
              </select>
            </label>
          </div>
        </section>

        <section class="accordion-item" data-accordion-id="format">
          <button type="button" class="accordion-trigger" aria-expanded="false" aria-controls="panel-format" id="trigger-format">
            <span class="accordion-label">Format</span>
            <span class="accordion-chevron" aria-hidden="true"></span>
          </button>
          <div class="accordion-panel" id="panel-format" role="region" aria-labelledby="trigger-format" hidden>
            <label class="field">
              <span>Size</span>
              <select id="layout-select" class="layout-select"></select>
            </label>
            <label class="field">
              <span>Orientation</span>
              <select id="orientation-select" class="layout-select">
                <option value="portrait">Portrait</option>
                <option value="landscape">Landscape</option>
              </select>
            </label>
          </div>
        </section>

        <section class="accordion-item" data-accordion-id="poi">
          <button type="button" class="accordion-trigger" aria-expanded="false" aria-controls="panel-poi" id="trigger-poi">
            <span class="accordion-label">Points of Interest</span>
            <span class="accordion-chevron" aria-hidden="true"></span>
          </button>
          <div class="accordion-panel" id="panel-poi" role="region" aria-labelledby="trigger-poi" hidden>
            <div class="poi-toolbar">
              <button type="button" id="poi-add" class="poi-add-btn">+ Add POI</button>
              <label class="poi-legend-toggle" title="Show a legend panel instead of individual callout labels">
                <span>Legend</span>
                <span class="poi-legend-switch">
                  <input type="checkbox" id="poi-legend-mode">
                  <span class="poi-legend-track"><span class="poi-legend-thumb"></span></span>
                </span>
              </label>
            </div>
            <ul class="poi-list" id="poi-list"></ul>
          </div>
        </section>
      </nav>

      <div class="export-actions">
        <!-- Hidden original buttons kept for JS compatibility -->
        <button type="button" id="export-png" class="btn-primary" style="display:none">Download PNG</button>
        <button type="button" id="export-svg" class="btn-secondary" style="display:none">Download SVG</button>

        <!-- New direct download/template links -->
        <div class="export-links">
          <a class="btn-primary" href="https://api.lakelines.co/design/ceramic-mug/LL-ED6B4703" target="_blank" rel="noopener">Ceramic Mug Template</a>
          <a class="btn-primary" href="https://api.lakelines.co/design/spiral-notebook/LL-ED6B4703" target="_blank" rel="noopener">Spiral Notebook Template</a>
          <a class="btn-secondary" href="https://api.lakelines.co/design/lake/svg/LL-ED6B4703" target="_blank" rel="noopener">Lake SVG</a>
          <a class="btn-secondary" href="https://api.lakelines.co/design/lake/svg/LL-ED6B4703" target="_blank" rel="noopener">Lake PNG</a>
        </div>
      </div>
    </aside>

    <main class="preview">
      <div class="preview-toolbar">
        <button type="button" id="rotate-right" class="icon-btn" title="Rotate right 15 degrees" aria-label="Rotate right 15 degrees">↺</button>
        <button type="button" id="rotate-left" class="icon-btn" title="Rotate left 15 degrees" aria-label="Rotate left 15 degrees">↻</button>
        <button type="button" id="zoom-out" class="icon-btn" title="Zoom out">−</button>
        <button type="button" id="zoom-in" class="icon-btn" title="Zoom in">+</button>
        <button type="button" id="reset-app-button" class="icon-btn" title="Reset app" aria-label="Reset application">⟲</button>
      </div>
      <div class="preview-container" id="preview-container">
        <div class="document-viewport" id="document-viewport">
          <div class="document" id="poster-frame">
          <div id="map" class="poster-map"></div>
            
          <div class="poster-compass" id="poster-compass" aria-hidden="true">
            <svg viewBox="0 0 100 100" class="poster-compass-svg" role="presentation">
              <circle cx="50" cy="50" r="38" class="poster-compass-disc" />
              <circle cx="50" cy="50" r="36" class="poster-compass-ring" />
              <g class="poster-compass-rose" id="poster-compass-rose">
                <path d="M50 16 L61 50 L50 42 L39 50 Z" class="poster-compass-north" />
                <path d="M50 84 L61 50 L50 58 L39 50 Z" class="poster-compass-south" />
                <circle cx="50" cy="50" r="4" class="poster-compass-center" />
              </g>
            </svg>
          </div>
          <div class="poster-labels" id="poster-labels">
            <h2 id="poster-city"></h2>
            <p id="poster-country"></p>
          </div>
          <div id="poi-overlay" class="poi-overlay" aria-hidden="true"></div>
          <div id="poi-legend" class="poi-legend" hidden></div>
        </div>
      </div>
    </main>
  </div>

  <dialog id="poi-dialog" class="poi-dialog">
    <form method="dialog" class="poi-dialog-form">
      <label class="poi-dialog-label" for="poi-name-input">Name this point</label>
      <input type="text" id="poi-name-input" class="poi-dialog-input" maxlength="60" placeholder="e.g. My Cabin" autocomplete="off">
      <div class="poi-dialog-actions">
        <button type="button" id="poi-dialog-cancel" class="poi-dialog-btn poi-dialog-btn--ghost">Cancel</button>
        <button type="submit" id="poi-dialog-confirm" class="poi-dialog-btn poi-dialog-btn--primary">Add</button>
      </div>
    </form>
  </dialog>

  <script src="https://kit.fontawesome.com/34941efc24.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="/appInit.js"></script>
  <script src="/mapStyle.js"></script>
  <script src="/mapApp.js"></script>
  
</body>
</html>
